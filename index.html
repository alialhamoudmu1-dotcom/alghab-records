<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل ضبوط مديرية الغاب</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            background-color: #e0e0e0;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-panel {
            background: linear-gradient(145deg, #f0f0f0, #cacaca);
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        #clock { font-size: 32px; font-weight: bold; color: #444; margin-bottom: 20px; }

        input, select, textarea {
            width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 12px;
            background: #e0e0e0; box-shadow: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
            font-family: 'Cairo', sans-serif; outline: none; box-sizing: border-box;
        }

        .hidden-field { display: none; border-right: 4px solid #2e7d32; }

        button {
            width: 100%; padding: 15px; border: none; border-radius: 50px;
            background: linear-gradient(145deg, #f0f0f0, #cacaca);
            box-shadow: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff;
            cursor: pointer; font-weight: bold; color: #555; transition: 0.2s;
            margin-top: 10px;
        }

        button:active { box-shadow: inset 3px 3px 7px #bebebe, inset -3px -3px 7px #ffffff; }

        .btn-save { background: #2e7d32; color: white; }

        /* سجل المحفوظات */
        .records-container {
            margin-top: 25px;
            text-align: right;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .record-card {
            background: #e0e0e0; padding: 15px; border-radius: 20px; margin-bottom: 15px;
            box-shadow: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff;
            border-right: 8px solid #2e7d32;
        }

        .record-header { display: flex; justify-content: space-between; font-weight: bold; }
        .record-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { padding: 5px; font-size: 12px; flex: 1; }

        /* Modal */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: #e0e0e0; padding: 25px; border-radius: 25px; width: 85%; max-width: 450px; max-height: 90vh; overflow-y: auto; }

        #main-ui { display: none; }
    </style>
</head>
<body>

    <div id="login-ui" class="glass-panel">
        <div id="clock">00:00:00</div>
        <input type="password" id="passCode" placeholder="كلمة المرور">
        <button onclick="login()">دخول للنظام</button>
    </div>

    <div id="main-ui" class="glass-panel">
        <h2 style="margin:0 0 15px 0;">سجل المحفوظات</h2>
        <button class="btn-save" onclick="openModal()">+ إضافة ضبط جديد</button>
        <input type="text" id="searchBox" onkeyup="search()" placeholder="بحث في السجلات...">
        <div id="displayArea" class="records-container"></div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="mTitle">إضافة ضبط جديد</h3>
            <input type="hidden" id="editID">
            
            <select id="mSec">
                <option>قسم السقيلبية</option>
                <option>قسم الزيارة</option>
                <option>قسم آفاميا</option>
                <option>قسم شطحة</option>
                <option>قسم عين الكروم</option>
                <option>قسم سلحب</option>
            </select>

            <input type="text" id="mNum" placeholder="رقم الضبط">
            <input type="text" id="mDate" placeholder="التاريخ (يدوي)">
            
            <select id="mType" onchange="toggleManual('mType', 'mManualType')">
                <option>ضبط تمويني</option>
                <option>ضبط حراجي</option>
                <option>ضبط مخالفة بناء</option>
                <option>ضبط سرقة كهرباء</option>
                <option>ضبط سلب</option>
                <option>ضبط قتل</option>
                <option value="other">أخرى (كتابة يدوية)</option>
            </select>
            <input type="text" id="mManualType" class="hidden-field" placeholder="اكتب نوع الضبط هنا...">

            <select id="mReason" onchange="toggleManual('mReason', 'mManualReason')">
                <option>معروض</option>
                <option>مذكرة إحضار</option>
                <option value="other">غير ذلك (كتابة يدوية)</option>
            </select>
            <input type="text" id="mManualReason" class="hidden-field" placeholder="اكتب سبب التنظيم هنا...">

            <textarea id="mSum" rows="3" placeholder="الخلاصة..."></textarea>
            
            <button class="btn-save" onclick="save()">حفظ البيانات</button>
            <button onclick="closeModal()" style="background:none; box-shadow:none; color:#888;">إلغاء</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('alghab_records_v3')) || [];

        function login() {
            if(document.getElementById('passCode').value === 'alghab2026') {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                render(db);
            } else { alert('خطأ!'); }
        }

        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-EG');
        }, 1000);

        function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; resetForm(); }

        function toggleManual(selID, inpID) {
            document.getElementById(inpID).style.display = (document.getElementById(selID).value === 'other') ? 'block' : 'none';
        }

        function save() {
            let type = document.getElementById('mType').value === 'other' ? document.getElementById('mManualType').value : document.getElementById('mType').value;
            let reason = document.getElementById('mReason').value === 'other' ? document.getElementById('mManualReason').value : document.getElementById('mReason').value;

            const entry = {
                id: document.getElementById('editID').value || Date.now(),
                section: document.getElementById('mSec').value,
                num: document.getElementById('mNum').value,
                date: document.getElementById('mDate').value,
                type: type,
                reason: reason,
                summary: document.getElementById('mSum').value
            };

            const index = db.findIndex(i => i.id == entry.id);
            if(index > -1) db[index] = entry;
            else db.push(entry);

            localStorage.setItem('alghab_records_v3', JSON.stringify(db));
            render(db);
            closeModal();
        }

        function render(dataList) {
            const area = document.getElementById('displayArea');
            area.innerHTML = dataList.length === 0 ? '<p style="color:#999">لا يوجد محفوظات</p>' : 
            dataList.map(item => `
                <div class="record-card">
                    <div class="record-header">
                        <span>رقم: ${item.num}</span>
                        <span style="color:#2e7d32">${item.type}</span>
                    </div>
                    <div style="font-size:12px; color:#888; margin:5px 0;">
                        ${item.section} | ${item.date} | السبب: ${item.reason}
                    </div>
                    <p style="font-size:14px; color:#444; margin:5px 0;">${item.summary}</p>
                    <div class="record-actions">
                        <button class="btn-action" style="color:#f0ad4e" onclick="edit(${item.id})">تعديل</button>
                        <button class="btn-action" style="color:#d9534f" onclick="del(${item.id})">حذف</button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function del(id) {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                db = db.filter(i => i.id != id);
                localStorage.setItem('alghab_records_v3', JSON.stringify(db));
                render(db);
            }
        }

        function edit(id) {
            const item = db.find(i => i.id == id);
            document.getElementById('editID').value = item.id;
            document.getElementById('mNum').value = item.num;
            document.getElementById('mSum').value = item.summary;
            document.getElementById('mDate').value = item.date;
            document.getElementById('mSec').value = item.section;
            document.getElementById('mTitle').textContent = "تعديل الضبط";
            openModal();
        }

        function search() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            const f = db.filter(i => i.num.includes(q) || i.summary.toLowerCase().includes(q) || i.type.toLowerCase().includes(q));
            render(f);
        }

        function resetForm() {
            document.getElementById('editID').value = '';
            document.getElementById('mNum').value = '';
            document.getElementById('mSum').value = '';
            document.getElementById('mTitle').textContent = "إضافة ضبط جديد";
        }
    </script>
</body>
</html>
