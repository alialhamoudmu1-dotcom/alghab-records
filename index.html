<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مديرية أمن الغاب - النظام المركزي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --bg-gray: #e0e0e0; --main-blue: #003a8c; --main-green: #0b4a0b; }
        body { background-color: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; min-height: 100vh; position: relative; }
        .screen { display: none; padding: 20px; box-sizing: border-box; }
        .active { display: block; }
        .header-box { background: #1a1a1a; padding: 25px; border-radius: 25px; border-bottom: 4px solid #4a3b10; text-align: center; margin-bottom: 20px; }
        .eagle-logo { width: 100px; padding: 8px; margin: 0 auto 15px; filter: drop-shadow(0 0 8px gold); }
        .input-group { background: var(--bg-gray); border: none; border-radius: 15px; box-shadow: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff; padding: 16px; width: 100%; outline: none; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; color: white; font-weight: bold; font-size: 17px; cursor: pointer; margin-bottom: 10px; }
        .btn-green { background-color: var(--main-green); }
        .btn-blue { background-color: var(--main-blue); }
        .record-card { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; color: #333; border-right: 5px solid var(--main-blue); position: relative; text-align: right; }
        .edit-btn { position: absolute; left: 10px; top: 10px; background: #ff9800; color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; }
        .sync-status { font-size: 10px; color: #76c893; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Coat_of_arms_of_Syria.svg/1200px-Coat_of_arms_of_Syria.svg.png" class="eagle-logo">
        <div style="background:#1a1a1a; padding:30px; border-radius:25px; text-align:center;">
            <h2>مديرية أمن الغاب</h2>
            <p style="color:#888;">نظام الأرشفة المركزي</p>
            <input type="password" id="login-pass" class="input-group" style="background:#222; color:white; text-align:center;" placeholder="أدخل كلمة المرور">
            <button class="btn btn-blue" onclick="checkLogin()">دخول للنظام</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div class="header-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Coat_of_arms_of_Syria.svg/1200px-Coat_of_arms_of_Syria.svg.png" style="width:70px;">
            <h3 style="margin:5px 0;">الجمهورية العربية السورية</h3>
            <h4 style="color:#76c893; margin:5px 0;">مديرية أمن الغاب</h4>
            <span class="sync-status">● متصل سحابياً - مزامنة لحظية</span>
        </div>
        <button class="btn btn-green" onclick="showForm('ضبط جديد')"> + إضافة ضبط جديد </button>
        <button class="btn btn-blue" onclick="showForm('سجل عدلي')"> إضافة للسجل العدلي </button>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" style="background:#333; flex:1;" onclick="viewData('justice')">السجل العدلي</button>
            <button class="btn" style="background:#003a8c; flex:1;" onclick="viewData('records')">سجل الضبوط</button>
        </div>
    </div>

    <div id="form-screen" class="screen" style="background:var(--bg-gray); color:#333;">
        <h2 id="form-title" style="text-align:center;"></h2>
        <div id="fields-area">
            <input type="text" id="f1" class="input-group" placeholder="الاسم الكامل">
            <input type="text" id="f2" class="input-group" placeholder="اسم الأب">
            <input type="text" id="f3" class="input-group" placeholder="الرقم الوطني / الهوية">
            <input type="text" id="f4" class="input-group" placeholder="التهمة / نوع الضبط">
            <textarea id="f5" class="input-group" style="height:100px" placeholder="تفاصيل إضافية..."></textarea>
            <input type="date" id="f6" class="input-group">
        </div>
        <button class="btn btn-green" onclick="saveToCloud()">حفظ ومزامنة تلقائياً</button>
        <button class="btn" style="background:#888;" onclick="goHome()">إلغاء</button>
    </div>

    <div id="view-screen" class="screen" style="background:var(--bg-gray); color:#333;">
        <h2 id="view-title" style="text-align:center;"></h2>
        <input type="text" id="search-box" class="input-group" onkeyup="liveSearch()" placeholder="بحث سريع...">
        <div id="data-list"></div>
        <button class="btn" style="background:#333; margin-top:20px;" onclick="goHome()">عودة</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://ahmed-safo-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentPath = "", dataCache = [], editKey = null;

    function checkLogin() { if(document.getElementById('login-pass').value === "2026") showScreen('main-screen'); else alert("خطأ"); }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function goHome() { editKey = null; showScreen('main-screen'); }
    function showForm(type) { currentPath = type === 'ضبط جديد' ? 'records' : 'justice'; document.getElementById('form-title').innerText = type; showScreen('form-screen'); }

    function saveToCloud() {
        const data = { name: document.getElementById('f1').value, father: document.getElementById('f2').value, idNum: document.getElementById('f3').value, type: document.getElementById('f4').value, details: document.getElementById('f5').value, date: document.getElementById('f6').value };
        if(editKey) db.ref(currentPath + '/' + editKey).set(data).then(() => { alert("تم التحديث ✅"); goHome(); });
        else db.ref(currentPath).push(data).then(() => { alert("تم الحفظ ✅"); goHome(); });
    }

    function viewData(path) {
        currentPath = path;
        document.getElementById('view-title').innerText = path === 'records' ? 'سجل الضبوط' : 'السجل العدلي';
        showScreen('view-screen');
        db.ref(path).on('value', (snapshot) => {
            const data = snapshot.val(); dataCache = []; const list = document.getElementById('data-list'); list.innerHTML = "";
            for(let key in data) {
                const item = data[key]; item.key = key; dataCache.push(item);
                const card = document.createElement('div'); card.className = 'record-card';
                card.innerHTML = `<div class="edit-btn" onclick="editItem('${key}')">تعديل</div><b>الاسم:</b> ${item.name}<br><b>النوع:</b> ${item.type}<br><small>${item.date}</small>`;
                list.appendChild(card);
            }
        });
    }

    function editItem(key) {
        const item = dataCache.find(i => i.key === key); editKey = key; showForm(currentPath === 'records' ? 'ضبط جديد' : 'سجل عدلي');
        setTimeout(() => { document.getElementById('f1').value = item.name; document.getElementById('f2').value = item.father; document.getElementById('f3').value = item.idNum; document.getElementById('f4').value = item.type; document.getElementById('f5').value = item.details; document.getElementById('f6').value = item.date; }, 100);
    }

    function liveSearch() {
        const term = document.getElementById('search-box').value.toLowerCase();
        const list = document.getElementById('data-list'); list.innerHTML = "";
        dataCache.filter(i => i.name.toLowerCase().includes(term)).forEach(item => {
            const card = document.createElement('div'); card.className = 'record-card';
            card.innerHTML = `<div class="edit-btn" onclick="editItem('${item.key}')">تعديل</div><b>الاسم:</b> ${item.name}<br><b>النوع:</b> ${item.type}`;
            list.appendChild(card);
        });
    }
</script>
</body>
</html>
